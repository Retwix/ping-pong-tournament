name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Typecheck, build & test
    runs-on: ubuntu-latest

    defaults:
      run:
        # The React app lives in a subfolder; run everything from there.
        working-directory: ping-pong-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ping-pong-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Run tests
        run: npm test
